server:
  port: 1098

spring:
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

# 日志查看器配置
logs:
  viewer:
    endpoint: /logs
    enable-auth: false
    paths:
      - C:/Users/root/Desktop/module/web/
      - C:/Users/root/Desktop/module/